site_name: Rendersynth Documentation & Tutorials
theme:
  name: material
  features:
    - navigation.tabs              # Top tabs instead of sidebar
    - navigation.tabs.sticky       # Tabs stay at top when scrolling
    - navigation.instant           # Instant loading (no page reload)
    - search.suggest               # Search suggestions
    - search.highlight             # Highlight search results
    - content.code.copy            # Copy button on code blocks
    - toc.integrate                # Table of contents in sidebar
  palette:
    - scheme: default
      primary: blue
      accent: cyan
  font:
    text: Roboto
    code: Roboto Mono
nav:
  - Home: index.md
  - Getting Started: setup.md
  - Architecture:
    - Overview: architecture/architecture_overview.md
    - Reference: architecture/reference_sheet.md
    - Distributions: architecture/distributions.md
    - Label Generation: architecture/label_gen.md
    - Serialization: architecture/pipeline_serialization.md
    - Operators: architecture/operators.md
    - Logging: architecture/logging.md
    - Pipeline Execution: architecture/pipeline_execution.md
    - Preview: architecture/preview.md
    - User Interface: architecture/ui.md
    - Non-destructiveness: architecture/context_restoring.md

    # ... more files coming
  - Tutorials:
    - Onboarding: tutorials/00_landing.md
    - 1 - Classes & Entities: tutorials/01_classes_entities.md
    - 2 - Create Pipeline: tutorials/02_create_pipeline.md
    - 3 - Labeling: tutorials/03_labeling.md
    - 4 - Distributions: tutorials/04_distributions.md
    - 5 - Create Labeling Formats: tutorials/05_new_label_format.md
    - 6 - Shader Randomization: tutorials/06_shader_randomize.md
    - 7 - Common Pitfalls: tutorials/07_common_pitfalls.md
    - 8 - Matching Labeling and Formats: tutorials/08_matching_labeling_generation.md
    - 9 - Batch Generation: tutorials/09_batch_generation.md
    - 10 - Preview: tutorials/10_preview.md
    - 11 - Importing and Exporting: tutorials/11_import_export.md
    - 12 - Labeling Rigs and Key: tutorials/12_labeling_rigs.md

    # ... more files coming
  - Examples:
    - Onboarding: examples/00_landing.md
    - Product Classification: examples/01_prod_classification.md
    - Image Segmentation: examples/02_image_segmentation.md
    - Pose Estimation: examples/03_pose_estimation.md
